<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>巡检报告 - 巡检宝</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">巡</div>
          <div><strong>巡检宝</strong><span>无人机巡检平台</span></div>
        </div>
        <nav class="nav">
          <a href="./index.html">首页驾驶舱</a>
          <a href="./communities.html">小区档案</a>
          <a href="./roads.html">道路街面</a>
          <a class="active" href="./reports.html">巡检报告</a>
          <a href="./issues.html">问题台账</a>
          <a href="./map-assets.html">地图资产</a>
        </nav>
        <div class="side-card">
          <span>当前页面</span>
          <strong>巡检报告</strong>
          <p>按日期、区域、类型查看和下载巡检成果。</p>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p class="eyebrow">REPORT CENTER</p>
            <h1>巡检报告</h1>
          </div>
          <button class="primary-button">上传报告</button>
        </header>

        <section class="content-section split-section">
          <article>
            <div class="section-head">
              <div>
                <p class="eyebrow">REPORT LIST</p>
                <h3>最新报告</h3>
              </div>
            </div>
            <div class="report-list">
              <button><span>06-24</span><strong>玉田新村飞线与堆物巡检报告</strong><em>PDF / 27 张照片</em></button>
              <button><span>06-22</span><strong>曲阳路沿街广告牌巡检报告</strong><em>PDF / 15 个点位</em></button>
              <button><span>06-19</span><strong>密云路占道经营复查报告</strong><em>PDF / 复查通过 8 项</em></button>
              <button><span>06-12</span><strong>河道绿化带专项巡检报告</strong><em>PDF / 11 张照片</em></button>
            </div>
          </article>

          <article class="report-preview">
            <div class="section-head">
              <div>
                <p class="eyebrow">REPORT PREVIEW</p>
                <h3>报告预览</h3>
              </div>
            </div>
            <div class="pdf-card">
              <span>PDF</span>
              <strong>玉田新村飞线与堆物巡检报告</strong>
              <p>报告摘要、关联问题、现场照片和复查建议会在这里集中展示。</p>
            </div>
          </article>
        </section>
      </main>
    </div>
  </body>
</html>
